services:

  api:
    build: .

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
      - ./chroma_cache:/root/.cache

    depends_on:
      - redis
      - jaeger

  worker:
    build: .

    command: celery -A app.worker worker --loglevel=info

    env_file:
      - .env

    volumes:
    - ./chroma_db:/app/chroma_db
    - ./chroma_cache:/root/.cache

    depends_on:
      - redis
      - jaeger

  redis:
    image: redis:7

  prometheus:
    image: prom/prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana

    ports:
      - "3000:3000"

  jaeger:
    image: jaegertracing/all-in-one:latest

    environment:
    - COLLECTOR_OTLP_ENABLED=true

    ports:
    - "16686:16686"
    - "6831:6831/udp"
    - "4317:4317"